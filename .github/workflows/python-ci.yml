name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for build/sanity checks.
        required: false
        type: string
        default: "3.12"
      install-spec:
        description: Pip install spec, e.g. .[dev]
        required: false
        type: string
        default: ".[dev]"
      compile-files:
        description: Space-separated Python files to compile-check.
        required: false
        type: string
        default: ""

jobs:
  build:
    name: Build & Sanity (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "${{ inputs.install-spec }}"
          python -m pip install build

      - name: Static sanity compile
        if: ${{ inputs.compile-files != '' }}
        run: python -m py_compile ${{ inputs.compile-files }}

      - name: Build package artifacts
        run: python -m build
